<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>🔥 UNO Online - Play with Friends</title>
  <link rel="stylesheet" href="/css/style.css">
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700;900&display=swap" rel="stylesheet">
</head>
<body>
  <div class="particles" id="particles"></div>

  <!-- Landing Page -->
  <div id="landing-page" class="page active">
    <div class="logo-container">
      <div class="uno-logo">
        <span class="uno-letter u">U</span>
        <span class="uno-letter n">N</span>
        <span class="uno-letter o">O</span>
      </div>
      <div class="logo-subtitle">Online Multiplayer</div>
    </div>

    <div class="menu-cards">
      <div class="menu-card" onclick="showPage('create-page')">
        <div class="menu-icon">🎮</div>
        <h3>Create Room</h3>
        <p>Start a new game and invite friends</p>
        <div class="card-glow"></div>
      </div>

      <div class="menu-card" onclick="showPage('join-page')">
        <div class="menu-icon">🔗</div>
        <h3>Join Room</h3>
        <p>Enter a room code to play</p>
        <div class="card-glow"></div>
      </div>

      <div class="menu-card" onclick="showPage('practice-page')">
        <div class="menu-icon">🤖</div>
        <h3>Practice</h3>
        <p>Play against AI bots</p>
        <div class="card-glow"></div>
      </div>
    </div>

    <div class="floating-cards">
      <div class="float-card red">+2</div>
      <div class="float-card blue">7</div>
      <div class="float-card green">🔄</div>
      <div class="float-card yellow">0</div>
      <div class="float-card wild">W</div>
    </div>
  </div>

  <!-- Create Room Page -->
  <div id="create-page" class="page">
    <div class="back-btn" onclick="showPage('landing-page')">← Back</div>
    <div class="form-container">
      <h2 class="animated-title">Create Game Room</h2>

      <div class="input-group">
        <label>Your Name</label>
        <input type="text" id="create-name" placeholder="Enter your name" maxlength="20">
      </div>

      <div class="settings-grid">
        <div class="setting-item">
          <label>Max Players</label>
          <select id="max-players">
            <option value="4">4 Players</option>
            <option value="6">6 Players</option>
            <option value="8">8 Players</option>
            <option value="10" selected>10 Players</option>
          </select>
        </div>

        <div class="setting-item">
          <label>AI Bots</label>
          <select id="bot-count">
            <option value="0">No Bots</option>
            <option value="1">1 Bot</option>
            <option value="2">2 Bots</option>
            <option value="3">3 Bots</option>
          </select>
        </div>

        <div class="setting-item">
          <label>Card Theme</label>
          <select id="card-theme">
            <option value="classic">Classic</option>
            <option value="neon">Neon Glow</option>
            <option value="dark">Dark Mode</option>
            <option value="minimal">Minimal</option>
          </select>
        </div>

        <div class="setting-item">
          <label>Stack +2</label>
          <select id="stack-draw2">
            <option value="true" selected>Enabled</option>
            <option value="false">Disabled</option>
          </select>
        </div>
      </div>

      <button class="btn-primary btn-pulse" onclick="createRoom()">
        <span>Create Room</span>
        <div class="btn-shine"></div>
      </button>
    </div>
  </div>

  <!-- Join Room Page -->
  <div id="join-page" class="page">
    <div class="back-btn" onclick="showPage('landing-page')">← Back</div>
    <div class="form-container">
      <h2 class="animated-title">Join Game</h2>

      <div class="input-group">
        <label>Your Name</label>
        <input type="text" id="join-name" placeholder="Enter your name" maxlength="20">
      </div>

      <div class="input-group">
        <label>Room Code</label>
        <input type="text" id="room-code" placeholder="Enter 6-digit code" maxlength="6" style="text-transform: uppercase;">
      </div>

      <div class="toggle-group">
        <label class="toggle">
          <input type="checkbox" id="spectator-mode">
          <span class="toggle-slider"></span>
          <span class="toggle-label">Join as Spectator 👁️</span>
        </label>
      </div>

      <button class="btn-primary btn-pulse" onclick="joinRoom()">
        <span>Join Room</span>
        <div class="btn-shine"></div>
      </button>
    </div>
  </div>

  <!-- Practice Page -->
  <div id="practice-page" class="page">
    <div class="back-btn" onclick="showPage('landing-page')">← Back</div>
    <div class="form-container">
      <h2 class="animated-title">Practice Mode</h2>

      <div class="input-group">
        <label>Your Name</label>
        <input type="text" id="practice-name" placeholder="Enter your name" maxlength="20">
      </div>

      <div class="setting-item">
        <label>Number of Bots</label>
        <select id="practice-bots">
          <option value="1">1 Bot</option>
          <option value="2" selected>2 Bots</option>
          <option value="3">3 Bots</option>
        </select>
      </div>

      <div class="setting-item">
        <label>Card Theme</label>
        <select id="practice-theme">
          <option value="classic">Classic</option>
          <option value="neon">Neon Glow</option>
          <option value="dark">Dark Mode</option>
        </select>
      </div>

      <button class="btn-primary btn-pulse" onclick="startPractice()">
        <span>Start Practice</span>
        <div class="btn-shine"></div>
      </button>
    </div>
  </div>

  <!-- Waiting Room Page -->
  <div id="waiting-page" class="page">
    <div class="waiting-container">
      <div class="room-code-display">
        <div class="code-label">Room Code</div>
        <div class="code-value" id="display-room-code">------</div>
        <button class="copy-btn" onclick="copyRoomCode()">📋 Copy</button>
      </div>

      <div class="players-list" id="players-list">
        <!-- Players populated by JS -->
      </div>

      <div class="waiting-actions">
        <button class="btn-secondary" id="add-bot-btn" onclick="addBot()">+ Add Bot</button>
        <button class="btn-primary btn-glow" id="start-game-btn" onclick="startGame()">Start Game 🚀</button>
      </div>

      <div class="host-only" id="host-controls">
        <div class="settings-mini">
          <label>Theme: <select id="waiting-theme" onchange="updateTheme()">
            <option value="classic">Classic</option>
            <option value="neon">Neon</option>
            <option value="dark">Dark</option>
          </select></label>
        </div>
      </div>
    </div>
  </div>

  <!-- Loading Overlay -->
  <div id="loading-overlay" class="overlay hidden">
    <div class="loader">
      <div class="loader-card red"></div>
      <div class="loader-card blue"></div>
      <div class="loader-card green"></div>
      <div class="loader-card yellow"></div>
    </div>
    <div class="loader-text">Loading...</div>
  </div>

  <!-- Toast Notifications -->
  <div id="toast-container"></div>

  <script src="/socket.io/socket.io.js"></script>
  <script src="/js/sounds.js"></script>
  <script src="/js/animations.js"></script>
  <script src="/js/main.js"></script>
</body>
</html>
