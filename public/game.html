<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>UNO Game Room</title>
  <link rel="stylesheet" href="/css/style.css">
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700;900&display=swap" rel="stylesheet">
</head>
<body class="game-body">
  <!-- Background Effects -->
  <div class="bg-gradient"></div>
  <div class="particles" id="game-particles"></div>

  <!-- Game Header -->
  <header class="game-header">
    <div class="header-left">
      <button class="menu-toggle" onclick="toggleSidebar()">☰</button>
      <div class="room-info">
        <span class="room-code" id="game-room-code">ROOM</span>
        <span class="round-badge">Round <span id="round-number">1</span></span>
      </div>
    </div>

    <div class="header-center">
      <div class="turn-indicator" id="turn-indicator">
        <div class="turn-pulse"></div>
        <span id="current-turn-text">Waiting...</span>
      </div>
    </div>

    <div class="header-right">
      <button class="icon-btn" onclick="toggleSound()" id="sound-btn">🔊</button>
      <button class="icon-btn" onclick="toggleMusic()" id="music-btn">🎵</button>
      <button class="icon-btn" onclick="showScores()">🏆</button>
    </div>
  </header>

  <!-- Main Game Area -->
  <main class="game-main">
    <!-- Other Players (Top) -->
    <div class="opponents-area" id="opponents-area">
      <!-- Populated by JS -->
    </div>

    <!-- Center Table -->
    <div class="table-area">
      <div class="deck-container">
        <div class="deck-pile" id="deck-pile" onclick="drawCard()">
          <div class="deck-card card-back"></div>
          <div class="deck-count" id="deck-count">108</div>
          <div class="deck-label">DRAW</div>
        </div>
      </div>

      <div class="discard-container">
        <div class="discard-pile" id="discard-pile">
          <div class="discard-card" id="top-card">
            <div class="card-placeholder">?</div>
          </div>
        </div>
        <div class="direction-indicator" id="direction-indicator">➡️</div>
      </div>

      <!-- Color Picker (shown for wild cards) -->
      <div class="color-picker hidden" id="color-picker">
        <div class="color-option red" data-color="red" onclick="pickColor('red')"></div>
        <div class="color-option blue" data-color="blue" onclick="pickColor('blue')"></div>
        <div class="color-option green" data-color="green" onclick="pickColor('green')"></div>
        <div class="color-option yellow" data-color="yellow" onclick="pickColor('yellow')"></div>
      </div>

      <!-- Pending Draw Indicator -->
      <div class="pending-draw hidden" id="pending-draw">
        <span class="pending-icon">⚡</span>
        <span class="pending-count" id="pending-count">+2</span>
      </div>
    </div>

    <!-- Your Hand (Bottom) -->
    <div class="your-hand-area" id="your-hand-area">
      <div class="hand-label">Your Cards</div>
      <div class="cards-container" id="your-cards">
        <!-- Cards populated by JS -->
      </div>
      <div class="hand-actions">
        <button class="action-btn uno-btn hidden" id="uno-btn" onclick="sayUno()">
          <span class="uno-text">UNO!</span>
          <div class="uno-glow"></div>
        </button>
        <button class="action-btn draw-btn" id="draw-btn" onclick="drawCard()">
          <span>Draw</span>
        </button>
      </div>
    </div>
  </main>

  <!-- Sidebar (Chat + Players + Reactions) -->
  <aside class="sidebar hidden" id="sidebar">
    <div class="sidebar-header">
      <h3>Game Panel</h3>
      <button class="close-sidebar" onclick="toggleSidebar()">✕</button>
    </div>

    <div class="sidebar-tabs">
      <button class="tab-btn active" onclick="switchTab('chat')">💬 Chat</button>
      <button class="tab-btn" onclick="switchTab('players')">👥 Players</button>
      <button class="tab-btn" onclick="switchTab('scores')">📊 Scores</button>
    </div>

    <!-- Chat Tab -->
    <div class="tab-content active" id="tab-chat">
      <div class="chat-messages" id="chat-messages"></div>
      <div class="chat-input-area">
        <div class="emoji-bar">
          <button onclick="sendEmoji('🔥')">🔥</button>
          <button onclick="sendEmoji('😂')">😂</button>
          <button onclick="sendEmoji('😱')">😱</button>
          <button onclick="sendEmoji('👏')">👏</button>
          <button onclick="sendEmoji('🎉')">🎉</button>
          <button onclick="sendEmoji('😢')">😢</button>
        </div>
        <div class="chat-input-row">
          <input type="text" id="chat-input" placeholder="Type a message..." maxlength="100">
          <button onclick="sendChat()">➤</button>
        </div>
      </div>
    </div>

    <!-- Players Tab -->
    <div class="tab-content" id="tab-players">
      <div class="players-detail" id="players-detail"></div>
    </div>

    <!-- Scores Tab -->
    <div class="tab-content" id="tab-scores">
      <div class="scores-detail" id="scores-detail"></div>
    </div>
  </aside>

  <!-- Emoji Overlay (floating emojis) -->
  <div class="emoji-overlay" id="emoji-overlay"></div>

  <!-- Score Modal -->
  <div class="modal hidden" id="score-modal">
    <div class="modal-content">
      <h2>🏆 Scoreboard</h2>
      <div class="score-table" id="score-table"></div>
      <button class="btn-primary" onclick="closeModal('score-modal')">Close</button>
    </div>
  </div>

  <!-- Round End Modal -->
  <div class="modal hidden" id="round-modal">
    <div class="modal-content round-end">
      <div class="round-winner" id="round-winner"></div>
      <div class="round-scores" id="round-scores"></div>
      <div class="modal-actions" id="round-actions">
        <button class="btn-primary btn-pulse" id="next-round-btn" onclick="nextRound()">Next Round →</button>
      </div>
    </div>
  </div>

  <!-- Game Over Modal -->
  <div class="modal hidden" id="gameover-modal">
    <div class="modal-content game-over">
      <div class="trophy">🏆</div>
      <h1 id="game-winner-name">Winner!</h1>
      <p class="game-over-text">Congratulations!</p>
      <div class="final-scores" id="final-scores"></div>
      <div class="modal-actions">
        <button class="btn-primary" onclick="playAgain()">Play Again</button>
        <button class="btn-secondary" onclick="goHome()">Main Menu</button>
      </div>
    </div>
  </div>

  <!-- Spectator Notice -->
  <div class="spectator-banner hidden" id="spectator-banner">
    👁️ You are in Spectator Mode
  </div>

  <!-- Toast -->
  <div id="toast-container"></div>

  <script src="/socket.io/socket.io.js"></script>
  <script src="/js/sounds.js"></script>
  <script src="/js/animations.js"></script>
  <script src="/js/game.js"></script>
</body>
</html>
