<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>UNO Online</title>
  <link rel="stylesheet" href="/css/style.css">
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&display=swap" rel="stylesheet">
</head>
<body>
  <div class="bg-stars" id="stars"></div>

  <!-- LANDING -->
  <div id="page-landing" class="page active">
    <div class="landing-content">
      <div class="uno-brand">
        <div class="uno-logo-big">
          <span class="logo-red">U</span>
          <span class="logo-blue">N</span>
          <span class="logo-green">O</span>
        </div>
        <div class="logo-trademark">™</div>
      </div>
      <p class="tagline">Play with friends online</p>

      <div class="mode-cards">
        <div class="mode-card" onclick="goTo('create')">
          <div class="mode-icon">🎮</div>
          <h3>Create Room</h3>
          <p>Start a game & invite friends</p>
          <div class="mode-shine"></div>
        </div>
        <div class="mode-card" onclick="goTo('join')">
          <div class="mode-icon">🔗</div>
          <h3>Join Room</h3>
          <p>Enter a code to play</p>
          <div class="mode-shine"></div>
        </div>
        <div class="mode-card" onclick="goTo('practice')">
          <div class="mode-icon">🤖</div>
          <h3>Practice</h3>
          <p>Play against AI bots</p>
          <div class="mode-shine"></div>
        </div>
      </div>
    </div>

    <div class="floating-deck">
      <div class="f-card f-red">+2</div>
      <div class="f-card f-blue">7</div>
      <div class="f-card f-green">⇄</div>
      <div class="f-card f-yellow">0</div>
      <div class="f-card f-wild">★</div>
    </div>
  </div>

  <!-- CREATE -->
  <div id="page-create" class="page">
    <button class="back-btn" onclick="goTo('landing')">←</button>
    <div class="form-box">
      <h2>Create Game Room</h2>
      <div class="field">
        <label>Your Name</label>
        <input type="text" id="c-name" placeholder="Enter your name" maxlength="16">
      </div>
      <div class="field-row">
        <div class="field half">
          <label>Max Players</label>
          <select id="c-max">
            <option value="4">4</option>
            <option value="6">6</option>
            <option value="8" selected>8</option>
            <option value="10">10</option>
          </select>
        </div>
        <div class="field half">
          <label>AI Bots</label>
          <select id="c-bots">
            <option value="0">None</option>
            <option value="1">1</option>
            <option value="2">2</option>
            <option value="3">3</option>
          </select>
        </div>
      </div>
      <div class="field-row">
        <div class="field half">
          <label>Card Theme</label>
          <select id="c-theme">
            <option value="classic">Classic</option>
            <option value="modern">Modern</option>
            <option value="dark">Dark</option>
          </select>
        </div>
        <div class="field half">
          <label>Stack +2</label>
          <select id="c-stack">
            <option value="true" selected>Yes</option>
            <option value="false">No</option>
          </select>
        </div>
      </div>
      <button class="btn-main" onclick="createRoom()">Create Room</button>
    </div>
  </div>

  <!-- JOIN -->
  <div id="page-join" class="page">
    <button class="back-btn" onclick="goTo('landing')">←</button>
    <div class="form-box">
      <h2>Join Game</h2>
      <div class="field">
        <label>Your Name</label>
        <input type="text" id="j-name" placeholder="Enter your name" maxlength="16">
      </div>
      <div class="field">
        <label>Room Code</label>
        <input type="text" id="j-code" placeholder="ABC123" maxlength="6" style="text-transform:uppercase;letter-spacing:4px;font-weight:700;">
      </div>
      <label class="check-row">
        <input type="checkbox" id="j-spec">
        <span class="check-box"></span>
        <span>Join as Spectator</span>
      </label>
      <button class="btn-main" onclick="joinRoom()">Join Room</button>
    </div>
  </div>

  <!-- PRACTICE -->
  <div id="page-practice" class="page">
    <button class="back-btn" onclick="goTo('landing')">←</button>
    <div class="form-box">
      <h2>Practice Mode</h2>
      <div class="field">
        <label>Your Name</label>
        <input type="text" id="p-name" placeholder="Enter your name" maxlength="16">
      </div>
      <div class="field-row">
        <div class="field half">
          <label>Bots</label>
          <select id="p-bots">
            <option value="1">1 Bot</option>
            <option value="2" selected>2 Bots</option>
            <option value="3">3 Bots</option>
          </select>
        </div>
        <div class="field half">
          <label>Theme</label>
          <select id="p-theme">
            <option value="classic">Classic</option>
            <option value="modern">Modern</option>
            <option value="dark">Dark</option>
          </select>
        </div>
      </div>
      <button class="btn-main" onclick="startPractice()">Start Practice</button>
    </div>
  </div>

  <!-- WAITING -->
  <div id="page-waiting" class="page">
    <div class="waiting-box">
      <div class="room-badge">
        <div class="badge-label">ROOM CODE</div>
        <div class="badge-code" id="w-code">------</div>
        <button class="btn-copy" onclick="copyCode()">📋</button>
      </div>

      <div class="player-list" id="w-players"></div>

      <div class="waiting-btns">
        <button class="btn-sec" id="w-addbot" onclick="addBot()">+ Add Bot</button>
        <button class="btn-main btn-glow" id="w-start" onclick="startGame()">Start Game</button>
      </div>

      <div class="host-only" id="w-hostonly">
        <label>Theme:
          <select id="w-themeselect" onchange="changeTheme()">
            <option value="classic">Classic</option>
            <option value="modern">Modern</option>
            <option value="dark">Dark</option>
          </select>
        </label>
      </div>
    </div>
  </div>

  <!-- LOADING -->
  <div id="loading" class="overlay hidden">
    <div class="spinner">
      <div class="spin-card red"></div>
      <div class="spin-card blue"></div>
      <div class="spin-card green"></div>
      <div class="spin-card yellow"></div>
    </div>
    <div class="spin-text">Loading...</div>
  </div>

  <div id="toasts"></div>

  <script src="/socket.io/socket.io.js"></script>
  <script src="/js/sounds.js"></script>
  <script src="/js/animations.js"></script>
  <script src="/js/main.js"></script>
</body>
</html>
